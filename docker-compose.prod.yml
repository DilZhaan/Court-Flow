services:
  web:
    image: ghcr.io/dilzhaan/court-flow-web:latest
    container_name: courtflow-web
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: ghcr.io/dilzhaan/court-flow-api:latest
    container_name: courtflow-api
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI}
      LOG_LEVEL: info
      INITIAL_ADMIN_EMAILS: admin@example.com
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
    restart: unless-stopped
